steps:
  # Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']

  # Build the application
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'start']

  # Deploy to Cloud Run (example)
  - name: 'gcloud'
    args: ['run', 'deploy', 'rag-app', '--source', '.', '--region', 'us-central1']

options:
  logging: CLOUD_LOGGING_ONLY
